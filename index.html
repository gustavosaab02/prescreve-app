<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>prescreveai.</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'DM Sans',sans-serif;background:#f7f5f0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
  .wrap{width:100%;max-width:400px;}
  .logo{font-family:'Fraunces',serif;font-size:32px;font-weight:700;color:#1a1a1a;text-align:center;margin-bottom:8px;}
  .logo span{color:#4a7c6f;}
  .tagline{font-size:14px;color:#888;text-align:center;margin-bottom:48px;line-height:1.5;}
  .card{background:white;border-radius:20px;border:1px solid #e8e8e4;padding:20px;margin-bottom:14px;display:flex;align-items:center;gap:16px;cursor:pointer;transition:all 0.15s;text-decoration:none;}
  .card:hover{border-color:#4a7c6f;box-shadow:0 4px 20px rgba(74,124,111,0.1);}
  .card-icon{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .card-icon.medico{background:#e8f2ef;}
  .card-icon.paciente{background:#f0f4ff;}
  .card-title{font-size:16px;font-weight:600;color:#1a1a1a;margin-bottom:3px;}
  .card-sub{font-size:13px;color:#888;line-height:1.4;}
  .card-arrow{margin-left:auto;color:#ccc;font-size:18px;flex-shrink:0;}
  .footer{text-align:center;font-size:12px;color:#bbb;margin-top:32px;}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">prescreveai<span>.</span></div>
  <div class="tagline">Recomendações médicas digitais.<br>Simples para o médico, fácil para o paciente.</div>

  <div class="card" id="cardMedico" onclick="goTo('medico')">
    <div class="card-icon medico">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="8" r="4" stroke="#4a7c6f" stroke-width="1.8"/>
        <path d="M4 20c0-3.314 3.582-6 8-6s8 2.686 8 6" stroke="#4a7c6f" stroke-width="1.8" stroke-linecap="round"/>
        <path d="M17 11v4M15 13h4" stroke="#4a7c6f" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
    </div>
    <div>
      <div class="card-title">Sou médico</div>
      <div class="card-sub">Envie recomendações para seus pacientes</div>
    </div>
    <div class="card-arrow">›</div>
  </div>

  <div class="card" id="cardPaciente" onclick="goTo('paciente')">
    <div class="card-icon paciente">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="8" r="4" stroke="#5b7fd4" stroke-width="1.8"/>
        <path d="M4 20c0-3.314 3.582-6 8-6s8 2.686 8 6" stroke="#5b7fd4" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
    </div>
    <div>
      <div class="card-title">Sou paciente</div>
      <div class="card-sub">Veja as recomendações do seu médico</div>
    </div>
    <div class="card-arrow">›</div>
  </div>

  <div class="footer">prescreveai. · Recomendações médicas digitais</div>
</div>

<script>
  const MEDICO_URL = 'prescreve-app.html';
  const PACIENTE_URL = 'prescreve-patient.html';

  // Se vier com parâmetro de recomendação, vai direto para paciente
  const params = new URLSearchParams(window.location.search);
  const recId = params.get('rec') || params.get('r');
  if (recId) {
    window.location.replace(PACIENTE_URL + '?rec=' + recId);
  }

  // Se já tem sessão salva, redireciona direto
  const lastRole = localStorage.getItem('prescreveai_role');
  if (lastRole === 'medico') {
    window.location.replace(MEDICO_URL);
  } else if (lastRole === 'paciente') {
    window.location.replace(PACIENTE_URL);
  }

  function goTo(role) {
    localStorage.setItem('prescreveai_role', role);
    window.location.href = role === 'medico' ? MEDICO_URL : PACIENTE_URL;
  }
</script>
</body>
</html>
